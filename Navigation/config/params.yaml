occupancy_grid:
  ros__parameters:
    pcl2_topic: /lidar/point_cloud
    map_frame: map
    resolution: 0.1
    min_height: 0.1
    max_height: 2.0

local_costmap:
  ros__parameters:
    pcl2_topic: /lidar/point_cloud
    map_frame: true

global_planner:
  ros__parameters:
    map_topic: /map
    goal_topic: /goal_pose
    path_topic: /global_path
    map_frame: map
    base_frame: base_link
    occupied_threshold: 50
    unknown_is_occupied: true

local_planner:
  ros__parameters:
    path_topic: /global_path
    cmd_topic: /cmd_vel
    map_frame: map
    base_frame: base_link
    lookahead_distance: 1.0
    goal_tolerance: 0.3
    linear_speed: 0.1
    control_rate_hz: 20.0 
    